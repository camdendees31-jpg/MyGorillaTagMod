name: Build Gorilla Tag Mod

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-qpm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qpm-

      - name: Install QPM CLI (nightly)
        run: |
          cargo +nightly install --git https://github.com/QuestPackageManager/QPM.CLI.git

      - name: Restore QPM dependencies
        run: |
          qpm restore

      - name: Build mod
        run: |
          dotnet build -c Release

      - name: Package QMOD
        run: |
          mkdir -p build
          cp bin/Release/net6.0/MyGorillaTagMod.dll build/
          cp mod.json build/
          cd build
          zip -r ../MyGorillaTagMod.qmod .
          cd ..

      - name: Upload QMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGorillaTagMod-qmod
          path: MyGorillaTagMod.qmod
